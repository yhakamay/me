name: Lint

on:
  pull_request:
    branches: ["main"]

jobs:
  eslint:
    name: Lint with ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint with ESLint
        run: npm run lint
